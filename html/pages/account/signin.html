<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/breakpoint.js"></script>
</head>

<body>

    <div class="container page-grid">
        <main class="page-block">
            <form class="form account" action="">
                <div class="account__section input">

                    <label for="name" class="account__section-label">Фамилия Имя Отчество*</label>
                    <input id="name" name="name" type="text" class="input__value account__section-input"
                        placeholder="ФИО*">
                    <label for="name" class="account__section-label-error">Имя не может содержать иные символы кроме
                        букв</label>

                    <span class="account__section-tip">Заполните, чтобы мы знали, как к вам обращаться</span>
                </div>
                <div class="account__section input">

                    <label for="mail" class="account__section-label">Email*</label>
                    <input id="mail" name="email" type="email" class="input__value account__section-input"
                        placeholder="test@kfjgdfg.et">
                    <label for="name" class="account__section-label-error">Имя не может содержать иные символы кроме
                        букв</label>

                    <span class="account__section-tip">Используйте как логин для входа в личный кабинет</span>

                </div>
                <div class="account__section input">

                    <label for="mail" class="account__section-label">Телефон*</label>
                    <input id="mail" name="email" type="email" class="input__value account__section-input"
                        placeholder="+7 908 123 23 23">
                    <label for="name" class="account__section-label-error">Неверно заполнено поле</label>

                    <span class="account__section-tip">Необходим для уточнения деталей заказа</span>

                </div>
                <div class="form__footer">
                    <button type="submit" class="button">сохранить изменения</button>
                </div>
            </form>

        </main>
    </div>
</body>

</html>
