<!DOCTYPE html>
<html lang="en">

<head>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>личный кабинет</title>
        <link rel="stylesheet" href="/style.css">
    </head>
</head>

<body>
    <div class="container page-grid">
        <main class="page-block">
            <form class="account" action="">
                <div class="input account__input ">
                    <label for="name" class="tag">Фамилия Имя Отчество*</label>
                    <input id="name" name="name" type="text" class="input__value" placeholder="иванов иван иванович">
                </div>
                <span class="input-tip">Заполните, чтобы мы знали, как к вам обращаться</span>

                <div class="input account__input ">
                    <label for="name" class="tag">Email*</label>
                    <input id="name" name="name" type="text" class="input__value" placeholder="test@kfjgdfg.et">
                </div>
                <span class="input-tip">Необходим для уточнения деталей заказа</span>

                <div class="input account__input ">
                    <label for="name" class="tag">телефон*</label>
                    <input id="name" name="name" type="text" class="input__value" placeholder="+7 908 123 23 23">
                </div>
                <span class="input-tip">Используйте как логин для входа в личный кабинет</span>

            </form>

        </main>
        <nav class="page-grid__sidebar">
            <div class="content__left-menu sidebar-menu">
                <a href="/html/pages/account/signin.html" class="sidebar-menu__item link">Профиль</a>
                <a href="/html/pages/account/orders.html" class="sidebar-menu__item link">мои записи</a>
            </div>
        </nav>
    </div>

</body>

</html>
