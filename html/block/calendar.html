        <div class="schedule-wrapper schedule-header calendar">
            <a class="calendar__nav calendar__nav_prev calendar__ button-arrow button-arrow_prev">
                <svg width="27" height="27" viewBox="0 2 27 29" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13.6067 24.2132L24.2133 13.6066H3.00009L13.6067 24.2132Z" fill="currentColor"
                        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </a>
            <table class="schedule">
                <tr class="calendar__days">
                    <td>10.11</td>
                    <td>10.11</td>
                    <td>10.11</td>
                    <td>10.11</td>
                    <td>10.11</td>

                    <td>пн</td>
                    <td>вт</td>
                    <td>ср</td>
                    <td>чт</td>
                    <td>пт</td>
                </tr>

                    <path d="M13.6067 24.2132L24.2133 13.6066H3.00009L13.6067 24.2132Z" fill="currentColor"
                        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
