<!-- input:password -->

<div class="input">
    <input type="password" class="input__value" placeholder="Ваш пароль">
    <span class="input__icon input__icon_password-visible js-toggle" ></span>
</div>
<script>
    document.querySelector('.js-toggle').addEventListener('click', function(e){
        e.target.classList.toggle('input__icon_password-hidden');
        e.target.classList.toggle('input__icon_password-visible');
        switch(e.target.previousElementSibling.type){
            case 'password':
                e.target.previousElementSibling.type = 'text';
                break;
            case 'text':
                e.target.previousElementSibling.type = 'password';
                break;
        }
        
    })
</script>
